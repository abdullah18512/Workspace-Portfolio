<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium vibrant blue/purple gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007acc" />
      <stop offset="50%" stop-color="#00b4d8" />
      <stop offset="100%" stop-color="#7209b7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background container with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#181818" stroke="#333" stroke-width="1.5" />
  <!-- Glimmering grid overlay -->
  <path d="M 20,0 L 20,100 M 40,0 L 40,100 M 60,0 L 60,100 M 80,0 L 80,100 M 0,20 L 100,20 M 0,40 L 100,40 M 0,60 L 100,60 M 0,80 L 100,80" stroke="#252526" stroke-width="1" />
  <!-- Glowing code symbol </ > -->
  <g transform="translate(10, 15)">
    <!-- Left bracket < -->
    <path d="M 28 20 L 10 35 L 28 50" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
    <!-- Slash / -->
    <path d="M 46 12 L 34 58" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)" />
    <!-- Right bracket > -->
    <path d="M 52 20 L 70 35 L 52 50" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  </g>
</svg>